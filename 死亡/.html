<h1>九层地狱</h1>
<p>地狱共有九层：温和、贪欲、暴食、贪婪、愤怒、异端、暴力、欺诈、背叛</p>
<ul>
    <li>
        <p>温和：草地和断壁残垣映于灰暗的天空之下，却并不显得恐怖</p>
        <img src="image-4.png" width="70%">
    </li>
    <li>
        <p>贪欲：荒地与枯萎的树木，狂风不断吹打着罪人</p>
        <img src="image-5.png" width="70%">
    </li>
    <li>
        <p>暴食：充斥着腐烂的食物和恶臭的污泥</p>
        <img src="image-6.png" width="70%">
    </li>
    <li>
        <p>贪婪：山峦之间，罪人们背负沉重的货物，在巨人的监视下，做着无尽的苦力</p>
        <img src="image-7.png" width="70%">
    </li>
    <li>
        <p>愤怒：炽热的岩浆之河中，满是暴怒的恶魔</p>
        <img src="image-8.png" width="70%">
    </li>
    <li>
        <p>异端：无尽的坟墓中，罪人的灵魂被不断地焚烧</p>
        <img src="image-9.png" width="70%">
    </li>
    <li>
        <p>暴力：滚烫的熔岩之海不断地翻腾</p>
        <img src="image-12.png" width="70%">
    </li>
    <li>
        <p>欺诈：阴暗的天空之下，没有一丝色彩</p>
        <img src="image-10.png" width="70%">
    </li>
    <li>
        <p>背叛：寒风狂啸，罪人被冰封于此</p>
        <img src="image-11.png" width="70%">
    </li>
</ul>
